<!DOCTYPE html>
<html lang="pt-BR" xmlns="http://www.w3.org/1999/xhtml">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="x-apple-disable-message-reformatting" />
  <title>{{subject}}</title>
  <!--[if mso]><style>* { font-family: Arial, Helvetica, sans-serif !important; }</style><![endif]-->
</head>
<body style="margin:0; padding:0; background-color:#eef1f5; -webkit-text-size-adjust:100%; -ms-text-size-adjust:100%;">
  <!-- pré-header (prévia invisível na caixa de entrada) -->
  <div style="display:none; max-height:0; overflow:hidden; opacity:0; color:#eef1f5;">{{preheader}}&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;</div>

  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:#eef1f5;">
    <tr>
      <td align="center" style="padding:32px 16px;">

        <!-- CARD branco -->
        <table role="presentation" width="600" cellpadding="0" cellspacing="0" border="0" style="width:600px; max-width:600px; margin:0 auto; background-color:#ffffff; border-radius:16px; border:1px solid #e5e9f0; overflow:hidden;">

          <!-- CABEÇALHO: faixa com a marca DA CIDADE (logo + nome) -->
          <tr>
            <td align="center" style="background-color:{{accent}}; background-image:linear-gradient(135deg, {{accent}} 0%, {{accent_dark}} 100%); padding:32px 40px 26px 40px;">
              <div>
                {{brand_mark}}
                <span style="display:inline-block; vertical-align:middle; margin-left:11px; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; font-size:22px; font-weight:700; letter-spacing:-0.2px; color:#ffffff;">{{tenant_name}}</span>
              </div>
              <div style="margin-top:7px; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; font-size:11px; letter-spacing:1.4px; text-transform:uppercase; color:rgba(255,255,255,0.70);">Gestão de Cemitérios</div>
            </td>
          </tr>

          <!-- CORPO (texto escuro sobre branco) -->
          <tr>
            <td style="padding:36px 40px 30px 40px; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; color:#3b4657;">
              {{body}}
            </td>
          </tr>

          <!-- RODAPÉ -->
          <tr>
            <td style="padding:0 40px 32px 40px; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;">
              <div style="border-top:1px solid #e8ecf2; padding-top:22px;">
                <p style="margin:0 0 6px 0; font-size:12.5px; line-height:1.6; color:#8a94a3;">{{footer_note}}</p>
                <p style="margin:0; font-size:12.5px; line-height:1.6; color:#8a94a3;">Este é um e-mail automático do <strong style="color:#5b6675;">Eterniza Gestão</strong> — não responda a esta mensagem.</p>
              </div>
            </td>
          </tr>
        </table>

        <!-- assinatura fora do card -->
        <table role="presentation" width="600" cellpadding="0" cellspacing="0" border="0" style="width:600px; max-width:600px; margin:0 auto;">
          <tr>
            <td style="padding:18px 8px 0 8px; text-align:center; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; font-size:11.5px; color:#9aa4b2;">
              © {{year}} Eterniza Gestão · plataforma de gestão de cemitérios
            </td>
          </tr>
        </table>

      </td>
    </tr>
  </table>
</body>
</html>

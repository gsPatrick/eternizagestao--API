<h1 style="margin:0 0 14px 0; font-family:Georgia,serif; font-size:27px; font-weight:600; color:#ffffff;">Redefinir senha</h1>
<p style="margin:0 0 16px 0; font-size:16px; line-height:1.7; color:rgba(255,255,255,0.82);">Olá, {{nome}}! Recebemos um pedido para redefinir a senha da sua conta. Clique no botão abaixo para criar uma nova senha.</p>
<table role="presentation" cellpadding="0" cellspacing="0" border="0" style="margin:26px 0 6px 0;"><tr><td style="border-radius:12px; background-color:#ffffff;"><a href="{{cta_url}}" style="display:inline-block; padding:14px 32px; font-family:Arial,Helvetica,sans-serif; font-size:16px; font-weight:bold; color:{{accent}}; text-decoration:none; border-radius:12px;">Criar nova senha</a></td></tr></table>
<p style="margin:20px 0 0 0; font-size:13px; line-height:1.6; color:rgba(255,255,255,0.55);">O link expira em 1 hora. Se não foi você, sua senha continua segura — basta ignorar este e-mail.</p>

<h1 style="margin:0 0 14px 0; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; font-size:22px; font-weight:700; color:{{accent_ink}};">Seu código de verificação</h1>
<p style="margin:0 0 20px 0; font-size:15.5px; line-height:1.65; color:#3b4657;">Olá, {{nome}}! Use o código abaixo para concluir sua verificação. Ele é válido por {{validade}}.</p>
<table role="presentation" cellpadding="0" cellspacing="0" border="0" style="margin:0 0 8px 0; width:100%;">
  <tr><td align="center" style="background-color:{{accent_soft}}; border:1px solid {{accent_border}}; border-radius:12px; padding:22px;">
    <span style="font-family:'Courier New',monospace; font-size:42px; font-weight:700; letter-spacing:14px; color:{{accent_ink}};">{{codigo}}</span>
  </td></tr>
</table>
<p style="margin:20px 0 0 0; font-size:13px; line-height:1.6; color:#8a94a3;">Nunca compartilhe este código. Se você não solicitou, ignore este e-mail.</p>

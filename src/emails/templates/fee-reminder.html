<h1 style="margin:0 0 14px 0; font-family:Georgia,serif; font-size:27px; font-weight:600; color:#ffffff;">Sua taxa vence em breve</h1>
<p style="margin:0 0 18px 0; font-size:16px; line-height:1.7; color:rgba(255,255,255,0.82);">Olá, {{nome}}! Este é um lembrete da taxa de manutenção do jazigo <strong style="color:#ffffff;">{{jazigo}}</strong>.</p>
<table role="presentation" cellpadding="0" cellspacing="0" border="0" style="width:100%; margin:0 0 8px 0;">
  <tr><td style="background-color:{{accent_mid}}; border:1px solid {{accent_border}}; border-radius:14px; padding:20px 22px;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="font-family:Arial,Helvetica,sans-serif;">
      <tr><td style="font-size:13px; color:rgba(255,255,255,0.6); padding-bottom:4px;">Vencimento</td><td align="right" style="font-size:14px; font-weight:bold; color:#ffffff;">{{vencimento}}</td></tr>
      <tr><td style="font-size:13px; color:rgba(255,255,255,0.6);">Valor</td><td align="right" style="font-size:20px; font-weight:bold; color:#ffffff;">{{valor}}</td></tr>
    </table>
  </td></tr>
</table>
<table role="presentation" cellpadding="0" cellspacing="0" border="0" style="margin:26px 0 6px 0;"><tr><td style="border-radius:12px; background-color:#ffffff;"><a href="{{cta_url}}" style="display:inline-block; padding:14px 32px; font-family:Arial,Helvetica,sans-serif; font-size:16px; font-weight:bold; color:{{accent}}; text-decoration:none; border-radius:12px;">Emitir 2ª via (PIX / boleto)</a></td></tr></table>
<p style="margin:20px 0 0 0; font-size:13px; line-height:1.6; color:rgba(255,255,255,0.55);">O pagamento é confirmado automaticamente em alguns minutos.</p>

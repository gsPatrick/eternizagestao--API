<h1 style="margin:0 0 14px 0; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; font-size:22px; font-weight:700; color:{{accent_ink}};">Pagamento confirmado</h1>
<p style="margin:0 0 18px 0; font-size:15.5px; line-height:1.65; color:#3b4657;">Olá, {{nome}}! Recebemos o pagamento da taxa do jazigo <strong style="color:#1f2a37;">{{jazigo}}</strong>. Obrigado!</p>
<table role="presentation" cellpadding="0" cellspacing="0" border="0" style="width:100%; margin:0 0 8px 0;">
  <tr><td style="background-color:{{accent_soft}}; border:1px solid {{accent_border}}; border-radius:12px; padding:18px 20px;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;">
      <tr><td style="font-size:13px; color:#6b7280; padding-bottom:6px;">Valor pago</td><td align="right" style="font-size:20px; font-weight:700; color:#1a7f5c;">{{valor}}</td></tr>
      <tr><td style="font-size:13px; color:#6b7280;">Recibo</td><td align="right" style="font-size:14px; font-weight:700; color:#1f2a37;">{{recibo}}</td></tr>
    </table>
  </td></tr>
</table>
<table role="presentation" cellpadding="0" cellspacing="0" border="0" style="margin:24px 0 6px 0;"><tr><td style="border-radius:10px; background-color:{{accent}};"><a href="{{cta_url}}" style="display:inline-block; padding:13px 30px; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; font-size:15.5px; font-weight:700; color:#ffffff; text-decoration:none; border-radius:10px;">Ver recibo</a></td></tr></table>

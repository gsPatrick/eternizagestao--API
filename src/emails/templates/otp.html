<h1 style="margin:0 0 14px 0; font-family:Georgia,serif; font-size:27px; font-weight:600; color:#ffffff;">Seu código de verificação</h1>
<p style="margin:0 0 20px 0; font-size:16px; line-height:1.7; color:rgba(255,255,255,0.82);">Olá, {{nome}}! Use o código abaixo para concluir sua verificação. Ele é válido por {{validade}}.</p>
<table role="presentation" cellpadding="0" cellspacing="0" border="0" style="margin:0 0 8px 0; width:100%;">
  <tr><td align="center" style="background-color:{{accent_mid}}; border:1px solid {{accent_border}}; border-radius:14px; padding:20px 22px;">
    <span style="font-family:'Courier New',monospace; font-size:44px; font-weight:bold; letter-spacing:14px; color:#ffffff;">{{codigo}}</span>
  </td></tr>
</table>
<p style="margin:20px 0 0 0; font-size:13px; line-height:1.6; color:rgba(255,255,255,0.55);">Nunca compartilhe este código. Se você não solicitou, ignore este e-mail.</p>

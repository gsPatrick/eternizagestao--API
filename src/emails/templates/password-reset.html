<h1 style="margin:0 0 14px 0; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; font-size:22px; font-weight:700; color:{{accent_ink}};">Redefinir senha</h1>
<p style="margin:0 0 16px 0; font-size:15.5px; line-height:1.65; color:#3b4657;">Olá, {{nome}}! Recebemos um pedido para redefinir a senha da sua conta. Clique no botão abaixo para criar uma nova senha.</p>
<table role="presentation" cellpadding="0" cellspacing="0" border="0" style="margin:24px 0 6px 0;"><tr><td style="border-radius:10px; background-color:{{accent}};"><a href="{{cta_url}}" style="display:inline-block; padding:13px 30px; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; font-size:15.5px; font-weight:700; color:#ffffff; text-decoration:none; border-radius:10px;">Criar nova senha</a></td></tr></table>
<p style="margin:20px 0 0 0; font-size:13px; line-height:1.6; color:#8a94a3;">O link expira em 1 hora. Se não foi você, sua senha continua segura — basta ignorar este e-mail.</p>
